{% extends 'base.html' %}

{% block title %}Novo Provedor | Ageis{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--primary-yellow);">
        <h2 style="margin-top: 0; color: #2d3436; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-plus-circle" style="color: var(--primary-yellow);"></i> Cadastrar Provedor
        </h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #636e72;">
                        {{ field.label }}
                    </label>
                    <div style="width: 100%;">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <small style="color: #d63031;">{{ field.errors|striptags }}</small>
                    {% endif %}
                </div>
            {% endfor %}

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" style="flex: 2; background: var(--primary-yellow); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                    SALVAR PARCEIRO
                </button>
                <a href="{% url 'listar_provedores' %}" style="flex: 1; text-align: center; background: #eee; color: #636e72; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 600;">
                    CANCELAR
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-control {
        width: 100%;
        padding: 12px;
        border: 2px solid #e1e8ef;
        border-radius: 8px;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
        outline: none;
    }
    .form-control:focus {
        border-color: var(--primary-yellow);
    }
</style>
{% endblock %}
